<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knifex — WPC</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230d0d0d'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='14' font-family='system-ui'>K</text></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="nick-modal" id="nick-modal" hidden>
    <div class="nick-modal-box">
      <p class="nick-modal-title">Введи ник</p>
      <p class="nick-modal-desc">Сохранится в браузере, нужен чтобы отмечать исправленное</p>
      <form id="nick-form">
        <input type="text" id="nick-input" placeholder="твой ник" maxlength="32" autocomplete="off" />
        <button type="submit" class="btn btn-primary btn-full">Продолжить</button>
      </form>
    </div>
  </div>

  <div class="container">
    <header>
      <button class="user-badge" id="user-badge" hidden title="Сменить ник"></button>
      <div class="header-actions">
        <button class="btn" id="refresh-btn">Обновить</button>
        <a href="/admin.html" class="btn btn-primary">+ Добавить</a>
      </div>
    </header>

    <div class="stats" id="stats"></div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="open">Открытые</button>
      <button class="filter-btn" data-filter="fixed">Исправленные</button>
      <input type="text" class="search-input" id="search" placeholder="Поиск..." />
    </div>

    <div class="vuln-list" id="vuln-list">
      <div class="loading">
        <div class="spinner"></div>
        <p>Загрузка...</p>
      </div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
